<!DOCTYPE html><html>
<head>
  <title>Happy Birthday Laija ❤️</title>  <style>
    body {
      text-align: center;
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      font-family: Arial;
      color: white;
      padding: 20px;
      overflow: hidden;
    }

    img {
      width: 250px;
      border-radius: 20px;
      margin-top: 20px;
    }

    button {
      padding: 15px;
      background: white;
      color: #ff4d6d;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      margin-top: 20px;
    }

    #message {
      margin-top: 20px;
      font-size: 20px;
      min-height: 100px;
    }

    .heart {
      position: absolute;
      bottom: -10px;
      width: 20px;
      height: 20px;
      background: red;
      transform: rotate(45deg);
      animation: floatUp 5s linear infinite;
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 20px;
      height: 20px;
      background: red;
      border-radius: 50%;
    }

    .heart::before {
      top: -10px;
      left: 0;
    }

    .heart::after {
      left: -10px;
      top: 0;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) rotate(45deg);
        opacity: 1;
      }
      100% {
        transform: translateY(-800px) rotate(45deg);
        opacity: 0;
      }
    }
  </style></head><body><h1>🎂 Happy Birthday Laija 🎂</h1>
<h2>24 & Beautiful ❤️</h2><img src="PASTE_IMAGE_LINK_HERE"><br><button onclick="startSurprise()">💌 Read My Heart</button>

<div id="message"></div><audio id="bgMusic" loop>
  <source src="PASTE_MUSIC_LINK_HERE" type="audio/mp3">
</audio><script>
const text = `From the moment I met you, my world changed...

You are not just special… you are everything I never knew I needed ❤️

I want to stay together with you all the time.

Happy Birthday Laija 🎉`;

let i = 0;

function typeWriter() {
  if (i < text.length) {
    document.getElementById("message").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter, 40);
  }
}

function startSurprise() {
  document.getElementById("bgMusic").play();
  typeWriter();
}

function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.style.left = Math.random() * window.innerWidth + "px";
  heart.style.animationDuration = (3 + Math.random() * 2) + "s";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}

setInterval(createHeart, 300);
</script></body>
</html>
